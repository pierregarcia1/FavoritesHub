<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate FavoritesHub Icons</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; }
    button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4f46e5; }
    p { color: #aaa; }
  </style>
</head>
<body>
  <h2>FavoritesHub Icon Generator</h2>
  <p>Click the button below to generate and download the 3 icon files. Save each file into this <code>icons/</code> folder.</p>
  <button onclick="generate()">Generate & Download Icons</button>
  <canvas id="c" style="display:none;"></canvas>

  <script>
    function generate() {
      [16, 48, 128].forEach(size => {
        const canvas = document.getElementById('c');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Background: rounded rect with gradient
        ctx.clearRect(0, 0, size, size);
        const r = size * 0.2;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();

        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, '#6366f1');
        grad.addColorStop(1, '#f472b6');
        ctx.fillStyle = grad;
        ctx.fill();

        // Heart
        ctx.fillStyle = '#fff';
        const cx = size / 2;
        const cy = size / 2;
        const scale = size / 128;

        ctx.save();
        ctx.translate(cx, cy + 4 * scale);
        ctx.scale(scale, scale);

        const heartSize = 36;
        ctx.beginPath();
        ctx.moveTo(0, heartSize * 0.3);
        ctx.bezierCurveTo(0, -heartSize * 0.1, -heartSize * 0.5, -heartSize * 0.5, -heartSize * 0.5, -heartSize * 0.1);
        ctx.bezierCurveTo(-heartSize * 0.5, heartSize * 0.3, 0, heartSize * 0.65, 0, heartSize * 0.65);
        ctx.bezierCurveTo(0, heartSize * 0.65, heartSize * 0.5, heartSize * 0.3, heartSize * 0.5, -heartSize * 0.1);
        ctx.bezierCurveTo(heartSize * 0.5, -heartSize * 0.5, 0, -heartSize * 0.1, 0, heartSize * 0.3);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Trigger download
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
